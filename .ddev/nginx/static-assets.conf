# Cache headers for static assets
# Included via DDEV's /mnt/ddev_config/nginx/*.conf

# Fonts — immutable, long cache
location ~* \.(woff2?|ttf|otf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary "Accept-Encoding";
    access_log off;
}

# Images — long cache
location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary "Accept-Encoding";
    access_log off;
}

# CSS and JS — long cache (use versioning/fingerprints in production)
location ~* \.(css|js)$ {
    expires 1M;
    add_header Cache-Control "public, must-revalidate";
    add_header Vary "Accept-Encoding";
    access_log off;
}

# Enable gzip for dynamic content
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/ld+json
    application/xml
    image/svg+xml
    font/woff2;
