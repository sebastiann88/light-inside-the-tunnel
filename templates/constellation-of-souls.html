<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constellation of Souls — Consistencialism</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 4px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 13px; margin-bottom: 28px; line-height: 1.5; font-style: italic; }
        .control-section { margin-bottom: 28px; }
        .control-section h3 {
            font-size: 15px; font-weight: 600; color: var(--anthropic-dark);
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '◇'; color: var(--anthropic-green); font-weight: bold; font-size: 10px; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-green); box-shadow: 0 0 0 2px rgba(120,140,93,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 18px; }
        .control-group label { display: block; font-size: 13px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 6px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray);
            border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: var(--anthropic-green); border-radius: 50%; cursor: pointer;
        }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px; background: var(--anthropic-green);
            border-radius: 50%; border: none; cursor: pointer;
        }
        .value-display { font-family: 'Courier New', monospace; font-size: 11px; color: var(--anthropic-mid-gray); min-width: 50px; text-align: right; }
        .button {
            width: 100%; padding: 10px; border: 1px solid var(--anthropic-light-gray);
            background: white; border-radius: 8px; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--anthropic-dark);
            transition: all 0.2s ease;
        }
        .button:hover { background: var(--anthropic-light); border-color: var(--anthropic-green); }
        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; }
        #canvas-container { border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(20,20,19,0.15); }
        .loading { padding: 40px; text-align: center; color: var(--anthropic-mid-gray); font-style: italic; }
        .quote { font-family: 'Lora', serif; font-size: 11px; color: var(--anthropic-mid-gray); line-height: 1.5; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--anthropic-light-gray); font-style: italic; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Constellation of Souls</h1>
            <p class="subtitle">Each star holds its position. Together they form the pattern. — Consistencialism</p>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="text" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button" onclick="previousSeed()">← Prev</button>
                    <button class="button" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button" onclick="randomSeedAndUpdate()" style="width:100%;margin-top:8px;">✦ Random Constellation</button>
            </div>

            <div class="control-section">
                <h3>Stars</h3>
                <div class="control-group">
                    <label>Number of Souls</label>
                    <div class="slider-container">
                        <input type="range" id="starCount" min="30" max="200" step="5" value="80" oninput="updateParam('starCount', this.value)">
                        <span class="value-display" id="starCount-value">80</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Connection Distance</label>
                    <div class="slider-container">
                        <input type="range" id="connectionDist" min="40" max="200" step="5" value="100" oninput="updateParam('connectionDist', this.value)">
                        <span class="value-display" id="connectionDist-value">100</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Wandering</label>
                    <div class="slider-container">
                        <input type="range" id="wanderStrength" min="0.1" max="2.0" step="0.1" value="0.5" oninput="updateParam('wanderStrength', this.value)">
                        <span class="value-display" id="wanderStrength-value">0.5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Warmth</label>
                    <div class="slider-container">
                        <input type="range" id="warmth" min="0.0" max="1.0" step="0.05" value="0.5" oninput="updateParam('warmth', this.value)">
                        <span class="value-display" id="warmth-value">0.5</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button" onclick="saveArt()">Save PNG</button>
                </div>
            </div>

            <div class="quote">
                "I believe we are imperfect, therefore life is the pursuit of something we cannot fully reach alone."
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Forming constellation...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 12345,
            starCount: 80,
            connectionDist: 100,
            wanderStrength: 0.5,
            warmth: 0.5
        };
        let defaultParams = {...params};
        let stars = [];
        let trails = [];
        let t = 0;

        // Consistencialism palette — sage, warm earth, soft gold, deep night
        const palette = {
            bg: [18, 22, 32],
            stars: [
                [212, 218, 206],  // sage light
                [200, 190, 160],  // warm parchment
                [180, 160, 120],  // gold
                [139, 115, 85],   // warm brown
                [107, 123, 94],   // sage green
                [160, 180, 200],  // cool blue
            ],
            connection: [180, 175, 160],
            glow: [220, 210, 190],
        };

        class Star {
            constructor(x, y, idx) {
                this.x = x;
                this.y = y;
                this.homeX = x;
                this.homeY = y;
                this.idx = idx;
                this.size = random(2, 5);
                this.brightness = random(150, 255);
                this.twinkleSpeed = random(0.01, 0.04);
                this.twinkleOffset = random(TWO_PI);
                this.wanderAngle = random(TWO_PI);
                this.colorIdx = floor(random(palette.stars.length));
                this.pulse = 0;
                this.connections = 0;
            }

            update() {
                // Gentle wandering — "not all who wander are lost"
                this.wanderAngle += random(-0.3, 0.3) * params.wanderStrength;
                let wx = cos(this.wanderAngle) * params.wanderStrength * 0.3;
                let wy = sin(this.wanderAngle) * params.wanderStrength * 0.3;

                // Gentle pull back home
                let dx = this.homeX - this.x;
                let dy = this.homeY - this.y;
                let homePull = 0.005;

                this.x += wx + dx * homePull;
                this.y += wy + dy * homePull;

                // Keep in bounds with soft edges
                this.x = constrain(this.x, 40, width - 40);
                this.y = constrain(this.y, 40, height - 40);

                // Twinkle
                this.brightness = map(sin(t * this.twinkleSpeed + this.twinkleOffset), -1, 1, 120, 255);

                // Decay pulse
                this.pulse *= 0.95;
                this.connections = 0;
            }

            draw() {
                let col = palette.stars[this.colorIdx];
                let warmShift = params.warmth;

                // Outer glow
                let glowSize = this.size * 4 + this.pulse * 3;
                noStroke();
                for (let g = glowSize; g > 0; g -= 2) {
                    let a = map(g, 0, glowSize, 30, 0);
                    fill(
                        col[0] + warmShift * 30,
                        col[1] + warmShift * 15,
                        col[2] - warmShift * 20,
                        a * (this.brightness / 255)
                    );
                    ellipse(this.x, this.y, g, g);
                }

                // Core
                fill(
                    min(255, col[0] + 50),
                    min(255, col[1] + 40),
                    min(255, col[2] + 20),
                    this.brightness
                );
                noStroke();
                ellipse(this.x, this.y, this.size, this.size);

                // Bright center point
                fill(255, 255, 240, this.brightness * 0.8);
                ellipse(this.x, this.y, this.size * 0.4, this.size * 0.4);
            }
        }

        function setup() {
            let canvas = createCanvas(900, 900);
            canvas.parent('canvas-container');
            pixelDensity(1);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            stars = [];
            trails = [];
            t = 0;

            // Place stars using noise for organic clustering
            for (let i = 0; i < params.starCount; i++) {
                let attempts = 0;
                let x, y;
                do {
                    x = random(60, width - 60);
                    y = random(60, height - 60);
                    attempts++;
                } while (attempts < 50 && tooClose(x, y, 20));

                stars.push(new Star(x, y, i));
            }

            background(palette.bg[0], palette.bg[1], palette.bg[2]);
            drawStaticBackground();
        }

        function tooClose(x, y, minDist) {
            for (let s of stars) {
                if (dist(x, y, s.x, s.y) < minDist) return true;
            }
            return false;
        }

        function drawStaticBackground() {
            // Distant background stars — the vast sky
            randomSeed(params.seed + 999);
            for (let i = 0; i < 400; i++) {
                let x = random(width);
                let y = random(height);
                let s = random(0.5, 1.5);
                let b = random(20, 60);
                fill(200, 200, 210, b);
                noStroke();
                ellipse(x, y, s, s);
            }

            // Subtle nebula wash
            for (let i = 0; i < 5; i++) {
                let nx = random(width);
                let ny = random(height);
                let nr = random(100, 300);
                for (let r = nr; r > 0; r -= 3) {
                    let a = map(r, 0, nr, 3, 0);
                    fill(
                        palette.stars[floor(random(palette.stars.length))][0],
                        palette.stars[floor(random(palette.stars.length))][1],
                        palette.stars[floor(random(palette.stars.length))][2],
                        a
                    );
                    ellipse(nx, ny, r, r * 0.7);
                }
            }
        }

        function draw() {
            // Soft fade — trails linger like memories
            fill(palette.bg[0], palette.bg[1], palette.bg[2], 25);
            noStroke();
            rect(0, 0, width, height);

            // Redraw faint background stars
            if (frameCount % 60 === 0) {
                randomSeed(params.seed + 999);
                for (let i = 0; i < 400; i++) {
                    let x = random(width);
                    let y = random(height);
                    let s = random(0.5, 1.5);
                    let b = random(15, 40);
                    fill(200, 200, 210, b);
                    noStroke();
                    ellipse(x, y, s, s);
                }
            }

            t++;

            // Update stars
            for (let s of stars) {
                s.update();
            }

            // Draw connections — the bonds between souls
            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    let d = dist(stars[i].x, stars[i].y, stars[j].x, stars[j].y);
                    if (d < params.connectionDist) {
                        let alpha = map(d, 0, params.connectionDist, 60, 0);
                        let w = map(d, 0, params.connectionDist, 1.5, 0.2);

                        // Connection color shifts with warmth
                        let warm = params.warmth;
                        stroke(
                            palette.connection[0] + warm * 30,
                            palette.connection[1] + warm * 10,
                            palette.connection[2] - warm * 30,
                            alpha
                        );
                        strokeWeight(w);
                        line(stars[i].x, stars[i].y, stars[j].x, stars[j].y);

                        // Both stars pulse when connected — filling both vessels
                        stars[i].pulse = max(stars[i].pulse, map(d, 0, params.connectionDist, 2, 0));
                        stars[j].pulse = max(stars[j].pulse, map(d, 0, params.connectionDist, 2, 0));
                        stars[i].connections++;
                        stars[j].connections++;
                    }
                }
            }

            // Draw stars
            for (let s of stars) {
                s.draw();
            }

            // Occasional gentle particle drift between connected stars
            if (frameCount % 3 === 0) {
                for (let i = 0; i < stars.length; i++) {
                    for (let j = i + 1; j < stars.length; j++) {
                        let d = dist(stars[i].x, stars[i].y, stars[j].x, stars[j].y);
                        if (d < params.connectionDist * 0.6 && random() < 0.02) {
                            trails.push({
                                x: stars[i].x, y: stars[i].y,
                                tx: stars[j].x, ty: stars[j].y,
                                progress: 0,
                                speed: random(0.01, 0.03),
                                size: random(1, 2.5),
                            });
                        }
                    }
                }
            }

            // Draw and update light particles traveling between stars
            for (let i = trails.length - 1; i >= 0; i--) {
                let tr = trails[i];
                tr.progress += tr.speed;
                if (tr.progress > 1) {
                    trails.splice(i, 1);
                    continue;
                }
                let px = lerp(tr.x, tr.tx, tr.progress);
                let py = lerp(tr.y, tr.ty, tr.progress);
                let a = sin(tr.progress * PI) * 150;
                fill(255, 250, 230, a);
                noStroke();
                ellipse(px, py, tr.size, tr.size);
            }

            // Keep trails manageable
            if (trails.length > 200) trails.splice(0, 50);
        }

        // UI Handlers
        function updateParam(name, value) {
            params[name] = parseFloat(value);
            document.getElementById(name + '-value').textContent = value;
            if (name === 'starCount') initializeSystem();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let val = parseInt(document.getElementById('seed-input').value);
            if (val && val > 0) { params.seed = val; initializeSystem(); }
            else updateSeedDisplay();
        }

        function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); initializeSystem(); }
        function nextSeed() { params.seed++; updateSeedDisplay(); initializeSystem(); }
        function randomSeedAndUpdate() { params.seed = Math.floor(Math.random() * 999999) + 1; updateSeedDisplay(); initializeSystem(); }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('starCount').value = params.starCount;
            document.getElementById('starCount-value').textContent = params.starCount;
            document.getElementById('connectionDist').value = params.connectionDist;
            document.getElementById('connectionDist-value').textContent = params.connectionDist;
            document.getElementById('wanderStrength').value = params.wanderStrength;
            document.getElementById('wanderStrength-value').textContent = params.wanderStrength;
            document.getElementById('warmth').value = params.warmth;
            document.getElementById('warmth-value').textContent = params.warmth;
            updateSeedDisplay();
            initializeSystem();
        }

        function saveArt() {
            saveCanvas('constellation-of-souls-' + params.seed, 'png');
        }

        window.addEventListener('load', updateSeedDisplay);
    </script>
</body>
</html>
